version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./faiss_index:/app/faiss_index
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/knowledge_graph?authSource=admin
      - FAISS_INDEX_PATH=/app/faiss_index
      - LOG_LEVEL=INFO
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - knowledge-graph-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    networks:
      - knowledge-graph-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:

networks:
  knowledge-graph-net:
    driver: bridge
