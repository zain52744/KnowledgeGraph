version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - .:/app
      - ./faiss_index:/app/faiss_index
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - MONGODB_URI=mongodb://admin:password@host.docker.internal:27017/knowledge_graph?authSource=admin
      - FAISS_INDEX_PATH=/app/faiss_index
      - LOG_LEVEL=INFO
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
